# Pre-commit Hooks - siehe https://pre-commit.com
# Installation:  uv run pre-commit install
repos:
  - repo: local
    hooks:
      - id: ruff-format
        name: ruff format
        entry: uv run ruff format
        language: system
        types: [python]

      - id: ruff-check
        name: ruff check
        entry: uv run ruff check --fix
        language: system
        types: [python]

      - id: mypy
        name: mypy (strict)
        entry: uv run mypy
        language: system
        pass_filenames: false
        types: [python]

      - id: pytest-fast
        name: pytest (fast subset)
        entry: uv run pytest -q -m "not slow"
        language: system
        pass_filenames: false
        types: [python]
