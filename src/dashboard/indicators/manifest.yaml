- id: buffett_indicator
  name: "Buffett Indicator (Market Cap / GDP)"
  category: valuation
  source: computed
  # NCBEILQ027S (Fed Z.1, Marktwert der Aktien nichtfinanzieller US-Unternehmen) steht in
  # Mio USD, GDP in Mrd USD -> /10 ergibt Prozent. (Wilshire-Serie von FRED eingestellt.)
  formula: "fred:NCBEILQ027S / fred:GDP / 10"
  unit: "%"
  decimals: 1
  direction: higher_is_stress
  cache_ttl_minutes: 1440
  what: |
    Verhaeltnis der gesamten US-Aktienmarktkapitalisierung zum Bruttoinlandsprodukt.
    Datenbasis: Fed-Z.1-Marktwert der Unternehmensaktien (NCBEILQ027S) geteilt durch GDP.
    Von Warren Buffett als "wohl bestes Einzelmass fuer Bewertung" bezeichnet.
  why: |
    Setzt den Marktwert ins Verhaeltnis zur realwirtschaftlichen Leistung. Hohe Werte
    bedeuten, dass Aktien teuer relativ zur Wirtschaft sind - historisch mit niedrigeren
    langfristigen Renditen verbunden. Da die Komponenten quartalsweise vorliegen, ist die
    Reihe vierteljaehrlich; die Einordnung erfolgt ueber das 10-Jahres-Percentil.
  example: |
    Diese Kennzahl setzt den Gesamtwert aller US-Aktien ins Verhaeltnis zur
    Wirtschaftsleistung (BIP). Sie beantwortet die Frage: Ist die Boerse im Vergleich zur
    realen Wirtschaft teuer oder guenstig? Warren Buffett nannte sie das "wohl beste
    Einzelmass fuer Bewertung".

    **Wie man sie liest:** Hohe Werte bedeuten, dass Aktien teuer sind - historisch folgten
    darauf magere langfristige Renditen. Es ist ein Mass fuer das Risiko auf Jahre, kein
    Signal fuer das Timing.

    **Beispiele:** Auf dem Dotcom-Hoch 2000 und im Jahr 2021 erreichte die Kennzahl
    historische Extremwerte. Liegt sie weit ueber dem langjaehrigen Schnitt, gilt das als
    Spaetzyklus-Warnung.

# ----------------------------------------------------------------------------
# 11) LIQUIDITY & MONEY
# ----------------------------------------------------------------------------
- id: fed_balance_sheet
  name: "Fed Total Assets"
  category: liquidity
  source: fred
  series_id: WALCL
  unit: "Mrd USD"
  display_multiplier: 0.001
  decimals: 0
  direction: higher_is_supportive
  cache_ttl_minutes: 1440
  what: |
    Bilanzsumme der US-Notenbank (woechentlich). Waechst durch
    Anleihekaeufe (QE), schrumpft durch Bilanzabbau (QT).
  why: |
    QE schafft Bankreserven und draengt Investoren in Risiko-Assets (Portfolio-Balance-
    Effekt); QT entzieht dem System Liquiditaet. Wendepunkte der Bilanzpolitik fielen
    historisch mit grossen Markttrendwechseln zusammen.
  example: |
    Die Bilanzsumme der US-Notenbank zeigt, wie viel Geld sie ins Finanzsystem pumpt. Sie
    waechst, wenn die Fed Anleihen kauft (genannt QE), und schrumpft, wenn sie das
    zurueckfaehrt (QT).

    **Wie man sie liest:** Eine wachsende Bilanz schiebt Anleger in riskantere Anlagen und
    stuetzt die Maerkte; eine schrumpfende entzieht Liquiditaet. Wendepunkte dieser Politik
    fielen oft mit grossen Trendwechseln an den Maerkten zusammen.

    **Beispiel:** Durch die Corona-Hilfen wuchs die Bilanz von ~4 Billionen auf ~9 Billionen
    USD (2020-2022) und schrumpfte danach wieder.

- id: m2_money_supply
  name: "US M2 Money Supply"
  category: liquidity
  source: fred
  series_id: M2SL
  unit: "Mrd USD"
  decimals: 0
  direction: higher_is_supportive
  cache_ttl_minutes: 1440
  what: |
    Breite Geldmenge M2 (Bargeld, Sichteinlagen, Spareinlagen, Geldmarktfonds),
    monatlich.
  why: |
    Misst die im Wirtschaftskreislauf verfuegbare Geldmenge. Starkes Wachstum kann
    Vermoegenspreise und Inflation treiben; der erste M2-Rueckgang seit Jahrzehnten
    (2022/23) galt als Signal verschaerfter Geldbedingungen.
  example: |
    M2 ist die breite Geldmenge: Bargeld, Giro- und Sparguthaben sowie Geldmarktfonds - also
    wie viel Geld insgesamt im Umlauf ist.

    **Wie man sie liest:** Waechst die Geldmenge stark, kann das Vermoegenspreise und
    Inflation antreiben. Schrumpft sie, sind die Geldbedingungen straff.

    **Beispiel:** 2020/21 sprang M2 historisch stark (Staatshilfen plus Anleihekaeufe).
    2022/23 fiel sie erstmals seit den 1930er-Jahren im Jahresvergleich - ein deutliches
    Signal verschaerfter Geldbedingungen.

- id: reverse_repo
  name: "Fed Reverse Repo Facility (ON RRP)"
  category: liquidity
  source: fred
  series_id: RRPONTSYD
  unit: "Mrd USD"
  decimals: 0
  direction: neutral
  what: |
    Volumen, das Geldmarktfonds und Banken ueber Nacht bei der Fed parken (Overnight
    Reverse Repo). Eine Art Liquiditaets-Parkplatz.
  why: |
    Ein hoher RRP-Bestand bindet ueberschuessige Liquiditaet bei der Fed; sein Abschmelzen
    setzt Reserven frei, die ins Bankensystem und potenziell in Risiko-Assets fliessen.
    Daher Schluesselgroesse der Net-Liquidity-Berechnung.
  example: |
    Diese Zahl zeigt, wie viel Geld Banken und Geldmarktfonds ueber Nacht bei der Fed
    "parken", statt es im Markt einzusetzen - eine Art Liquiditaets-Parkplatz.

    **Wie man sie liest:** Ein hoher Bestand bindet ueberschuessiges Geld bei der Fed.
    Schmilzt er ab, fliesst dieses Geld zurueck ins Bankensystem und potenziell in riskantere
    Anlagen - er ist deshalb ein Baustein der "Netto-Liquiditaet".

    **Beispiel:** 2022/23 stieg der Bestand auf ueber 2,5 Billionen USD (zu viel Geld im
    System), schmolz danach aber stark ab und stuetzte so den Markt.

- id: tga
  name: "Treasury General Account (TGA)"
  category: liquidity
  source: fred
  series_id: WTREGEN
  unit: "Mrd USD"
  display_multiplier: 0.001
  decimals: 0
  direction: neutral
  cache_ttl_minutes: 1440
  what: |
    Das "Girokonto" des US-Finanzministeriums bei der Fed (woechentlich). Steigt durch
    Steuereinnahmen/Anleiheemissionen, faellt durch Staatsausgaben.
  why: |
    Ein TGA-Aufbau zieht Liquiditaet aus dem Bankensystem (Geld wandert von Banken zur
    Fed), ein Abbau speist sie ein. Besonders nach Schuldenobergrenzen-Deals (TGA-Refill)
    ein wichtiger, oft unterschaetzter Liquiditaetstreiber.
  example: |
    Das ist das "Girokonto" des US-Finanzministeriums bei der Fed. Es fuellt sich durch
    Steuern und Anleiheverkaeufe und leert sich durch Staatsausgaben.

    **Wie man es liest:** Fuellt sich das Konto, zieht der Staat Geld aus dem Bankensystem ab
    (belastet die Maerkte). Leert es sich, fliesst Geld zurueck (stuetzt sie). Ein oft
    unterschaetzter Liquiditaetstreiber.

    **Beispiel:** Nach dem Schuldenstreit im Juni 2023 fuellte das Finanzministerium das
    Konto rasch wieder auf und entzog dem Markt mehrere hundert Milliarden USD.

- id: net_liquidity
  name: "Fed Net Liquidity"
  priority: 3
  category: liquidity
  source: computed
  # RRPONTSYD steht in Mrd USD, WALCL/WTREGEN in Mio USD -> RRP *1000 angleichen.
  formula: "fred:WALCL - fred:WTREGEN - fred:RRPONTSYD * 1000"
  unit: "Mrd USD"
  display_multiplier: 0.001
  decimals: 0
  direction: higher_is_supportive
  cache_ttl_minutes: 1440
  what: |
    Liquiditaetskennzahl, die Makro-Trader taeglich beobachten: Fed-Bilanzsumme
    abzueglich Treasury General Account und Reverse-Repo-Bestand. Reflektiert die
    tatsaechlich im Bankensystem verfuegbaren Reserven.
  why: |
    Stark korreliert mit der Performance von Risiko-Assets (S&P 500, BTC) seit 2020:
    TGA-Aufbau und RRP-Zuwachs ziehen Liquiditaet ab (Risk-Off-Druck), ihr Abbau wirkt
    stuetzend. Besonders relevant um QE/QT-Wenden und TGA-Refill-Phasen.
  example: |
    Diese Kennzahl fasst drei Liquiditaets-Groessen zusammen: Fed-Bilanz minus Staats-
    Girokonto (TGA) minus geparktes Geld (Reverse Repo). Ergebnis ist das Geld, das
    tatsaechlich frei im Bankensystem zirkuliert.

    **Wie man sie liest:** Steigt die Netto-Liquiditaet, ist Rueckenwind fuer riskante
    Anlagen da; faellt sie, herrscht Gegenwind. Seit 2020 laeuft sie auffallend im Gleichlauf
    mit S&P 500 und Bitcoin.

    **Beispiel:** Vom Hoch (~6,3 Billionen USD, Maerz 2022) fiel sie bis Okt. 2023 auf ~5,3
    Billionen. Nach dem Schuldenstreit Juni 2023 entzog das Auffuellen des Staatskontos dem
    Markt binnen Wochen rund 500 Milliarden USD.

