- id: russell_2000
  name: "Russell 2000"
  category: breadth
  source: stooq
  symbol: "^rut"
  unit: Index
  decimals: 0
  direction: neutral
  what: |
    Index der 2000 kleinsten Unternehmen des Russell-3000 - das US-Small-Cap-Barometer.
  why: |
    Small Caps sind binnenkonjunktur- und finanzierungssensibler als Mega-Caps. Ihre
    relative Staerke gilt als Zeichen breiter, gesunder Marktphasen; Schwaeche deutet auf
    Spaetzyklus oder Kreditstress (hoeherer Anteil unprofitabler, verschuldeter Firmen).
  example: |
    Der Russell 2000 buendelt 2000 kleinere US-Firmen ("Small Caps") - das Gegenstueck zu
    den grossen Konzernen.

    **Wie man ihn liest:** Kleine Firmen haengen staerker an der heimischen Konjunktur und an
    guenstigen Krediten. Laufen sie gut, ist der Aufschwung "breit" und gesund. Bleiben sie
    zurueck, deutet das auf Spaetzyklus oder Kreditstress hin - viele Small Caps sind
    verschuldet oder unprofitabel.

    **Beispiel:** 2022-2024 blieben die Small Caps deutlich hinter dem S&P 500 zurueck, weil
    hoehere Zinsen sie besonders hart trafen.

- id: r2k_sp500_ratio
  name: "Russell 2000 / S&P 500 Ratio"
  category: breadth
  source: computed
  formula: "norm100(stooq:^rut / stooq:^spx)"
  unit: Ratio
  decimals: 1
  direction: lower_is_stress
  what: |
    Verhaeltnis von Small-Cap- zu Large-Cap-Index, normiert auf Startwert 100. Ein
    direkter Breadth-Indikator (Marktbreite).
  why: |
    Steigt das Verhaeltnis, partizipieren auch kleinere Firmen am Aufschwung - ein
    gesundes, breites Marktbild. Faellt es, traegt nur eine schmale Spitze den Markt,
    was historisch zyklische Wendepunkte und erhoehte Fragilitaet markiert.
  example: |
    Diese Kennzahl teilt den Small-Cap-Index durch den S&P 500 (auf Start 100 normiert). Sie
    zeigt mit einem Blick, ob auch kleinere Firmen mitlaufen - oder nur die Grossen.

    **Wie man sie liest:** Steigt die Linie, ist der Aufschwung "breit" und gesund. Faellt
    sie, traegt nur eine schmale Spitze den Markt - historisch ein Zeichen fuer Wendepunkte
    und erhoehte Anfaelligkeit.

    **Beispiel:** Von 2021 bis 2024 fiel die Linie fast durchgehend, weil die "Magnificent 7"
    (die grossen Tech-Werte) den S&P trugen, waehrend die kleinen Firmen zurueckblieben.

- id: rsp_spy_ratio
  name: "Equal-Weight / Cap-Weight S&P Ratio"
  category: breadth
  source: computed
  formula: "norm100(stooq:rsp.us / stooq:spy.us)"
  unit: Ratio
  decimals: 1
  direction: lower_is_stress
  what: |
    Verhaeltnis des gleichgewichteten S&P 500 (RSP) zum kapitalisierungsgewichteten
    (SPY), normiert auf 100. Direktes Mass fuer Indexkonzentration.
  why: |
    Faellt das Verhaeltnis, schlagen die groessten Werte den Durchschnitt - der Index
    haengt zunehmend an wenigen Aktien (Klumpenrisiko). Solche Phasen sind anfaellig,
    wenn die Fuehrungstitel drehen, weil dann keine Breite stuetzt.
  example: |
    Diese Kennzahl vergleicht zwei Versionen des S&P 500: eine, in der jede Aktie gleich
    zaehlt (RSP), und die normale, in der die Grossen dominieren (SPY). So sieht man, wie
    stark der Index von wenigen Riesen abhaengt.

    **Wie man sie liest:** Faellt die Linie, schlagen die groessten Werte den Durchschnitt -
    der Index haengt dann an wenigen Aktien (Klumpenrisiko). Drehen diese, fehlt die Breite,
    die ihn stuetzt.

    **Beispiel:** 2023/24 erreichte die Konzentration durch die KI-Rally der Tech-Giganten
    den hoechsten Stand seit Jahrzehnten - die Linie fiel auf markante Tiefs.

