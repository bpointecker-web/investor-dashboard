    stress: 25
  what: |
    Zusammengesetzter Stimmungsindex (0 = extreme Angst, 100 = extreme Gier) aus
    sieben Teilindikatoren (u.a. Momentum, Vola, Put/Call, Safe-Haven-Nachfrage).
  why: |
    Buehne fuer Behavioral Finance: Extreme Angst (<25) markiert oft Kapitulation und
    damit antizyklische Kaufgelegenheiten, extreme Gier (>75) Sorglosigkeit und
    Rueckschlagrisiko. Funktioniert als Kontraindikator an den Extremen.
  example: |
    Dieser Index fasst die Boersenstimmung in einer Zahl von 0 bis 100 zusammen: 0 = extreme
    Angst, 100 = extreme Gier. Er wird aus sieben Bausteinen berechnet (u.a. Schwankungen,
    Put/Call-Verhaeltnis, Nachfrage nach sicheren Anlagen).

    **Wie man ihn liest:** An den Extremen wirkt er oft als Gegenindikator. Sehr grosse Angst
    (unter 25) faellt haeufig mit Tiefpunkten zusammen (Kaufgelegenheiten), grosse Gier
    (ueber 75) mit Sorglosigkeit und Rueckschlagrisiko.

    **Beispiel:** Im Corona-Crash (Maerz 2020) rutschte der Index in den einstelligen
    Bereich. Phasen mit Werten ueber 80 gingen mehrfach kurzen Rueckschlaegen voraus.

- id: naaim_exposure
  name: "NAAIM Manager Exposure Index"
  category: sentiment
  source: naaim
  symbol: exposure
  unit: "%"
  decimals: 0
  direction: neutral
  cache_ttl_minutes: 1440
  what: |
    Durchschnittliche Aktienquote aktiver US-Vermoegensverwalter (NAAIM-Mitglieder),
    woechentlich erhoben. Reicht von stark short (negativ) bis gehebelt long (>100 %).
  why: |
    Zeigt die tatsaechliche Positionierung professioneller Trader (nicht nur Meinung).
    Sehr hohe Quoten signalisieren "all in"-Risiko (wenig Nachkaufpotenzial), sehr
    niedrige defensive Zurueckhaltung - an den Extremen ein Kontraindikator.
  example: |
    Diese woechentliche Umfrage zeigt, wie stark aktive US-Vermoegensverwalter gerade in
    Aktien investiert sind. Die Werte reichen von stark fallend gesetzt (negativ) bis ueber
    100 % (auf Kredit investiert).

    **Wie man sie liest:** Sie zeigt echtes Verhalten, nicht nur Meinungen. Sehr hohe Quoten
    bedeuten "alle sind schon investiert" (wenig Nachschub fuer steigende Kurse), sehr
    niedrige bedeuten Vorsicht - an den Extremen ein Gegenindikator.

    **Beispiel:** In Korrekturen faellt die Quote Richtung 0 % oder darunter, in euphorischen
    Phasen steigt sie auf oder ueber 100 %.

- id: cboe_put_call_total
  name: "CBOE Total Put/Call Ratio"
  category: sentiment
  source: cboe
  symbol: total
  unit: Ratio
  decimals: 2
  direction: higher_is_stress
  what: |
    Verhaeltnis gehandelter Put- zu Call-Optionen am US-Gesamtmarkt. Misst, wie stark
    sich Anleger gegen Kursrueckgaenge absichern. (CBOE-Quelle; bezogen ueber den
    oeffentlichen CNN-Datensatz, da CBOE den freien Zugang eingestellt hat.)
  why: |
    Hohe Werte (viele Puts) zeigen Angst/Absicherungsbedarf - an Extremen oft ein
    antizyklisches Boden-Signal. Niedrige Werte (viele Calls) deuten auf Sorglosigkeit.
    Mechanisch steigt die Ratio in fallenden Maerkten durch Hedging-Nachfrage.
  example: |
    Diese Kennzahl vergleicht, wie viele Put-Optionen (Absicherung gegen fallende Kurse)
    gegenueber Call-Optionen (Wetten auf steigende Kurse) gehandelt werden.

    **Wie man sie liest:** Ein hoher Wert heisst viel Absicherung, also Angst - an Extremen
    oft ein antizyklisches Boden-Signal. Ein niedriger Wert heisst Sorglosigkeit. In
    fallenden Maerkten steigt die Kennzahl automatisch, weil mehr abgesichert wird.

    **Beispiel:** In Panikphasen (z. B. Corona-Crash Maerz 2020) sprang sie ueber 1,2.
    Dauerhaft niedrige Werte (unter 0,7) gelten als Zeichen von Spaetzyklus-Sorglosigkeit.

