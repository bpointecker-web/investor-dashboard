# =============================================================================
# Indikator-Katalog (Manifest)
# Deklarative Beschreibung aller Indikatoren. Der Code laedt ausschliesslich
# dieses YAML - keine hartkodierten Listen.
#
# Felder:
#   id, name, category, source, unit, direction, decimals,
#   display_multiplier, cache_ttl_minutes (optional, default 60),
#   series_id | symbol | formula  (je nach source),
#   thresholds (optional: low/elevated/stress in Anzeige-Einheiten),
#   what / why / example  (Deutsch, mechanistisch erklaerend)
# =============================================================================

# ----------------------------------------------------------------------------
# 1) CREDIT SPREADS
# ----------------------------------------------------------------------------
- id: us_hy_spread
  name: "US High Yield Spread (OAS)"
  priority: 3
  category: credit
  source: fred
  series_id: BAMLH0A0HYM2
  unit: bp
  display_multiplier: 100
  decimals: 0
  direction: higher_is_stress
  thresholds:
    elevated: 500
    stress: 700
  what: |
    Aufschlag, den US-Hochzinsanleihen ("Junk Bonds", Rating BB+ und schlechter)
    ueber vergleichbare US-Staatsanleihen zahlen muessen. Misst die Risikopraemie
    fuer Kreditrisiko im spekulativen Segment (Option-Adjusted Spread).
  why: |
    Klassischer Fruehindikator fuer Marktstress und Rezession. Erwarten Investoren
    mehr Ausfaelle, fordern sie hoehere Spreads; steigende Refinanzierungskosten
    verschaerfen dann die Lage der schwaechsten Emittenten zusaetzlich. Bewegt sich
    oft 6-12 Monate vor Aktienkorrekturen und ist eng an den US-Konjunkturzyklus gekoppelt.
  example: |
    Der Aufschlag wird in Basispunkten gemessen (100 bp = 1 Prozentpunkt). Je hoeher er
    ist, desto mehr Extra-Zins verlangen Anleger dafuer, dass sie schwaecheren Firmen Geld
    leihen.

    **So liest du die Hoehe:** 300-400 bp bedeuten eine ruhige Lage. Ueber 500 bp wird der
    Markt nervoes. Ueber 700 bp herrscht echter Stress - Anleger rechnen mit vielen Pleiten.

    **Beispiele:** Nach der Lehman-Pleite (Okt. 2008) stieg der Aufschlag auf rund 1900 bp,
    im Corona-Crash (Maerz 2020) auf etwa 1100 bp. In beiden Faellen wollte kaum jemand
    riskanten Firmen noch Geld leihen.

    **Der umgekehrte Fall ist genauso wichtig:** Ist der Aufschlag sehr niedrig (unter
    300 bp), verlangen Anleger fast keine Praemie mehr fuers Risiko - ein Zeichen von
    Sorglosigkeit. Das klingt beruhigend, war in der Vergangenheit aber oft ein Warnzeichen
    kurz vor dem Abschwung, etwa Anfang 2007 vor der Finanzkrise.

- id: us_ig_spread
  name: "US Investment Grade Spread (OAS)"
  category: credit
  source: fred
  series_id: BAMLC0A0CM
  unit: bp
  display_multiplier: 100
  decimals: 0
  direction: higher_is_stress
  thresholds:
    elevated: 150
    stress: 250
  what: |
    Risikoaufschlag von US-Unternehmensanleihen mit gutem Rating (BBB- und besser)
    gegenueber Staatsanleihen. Deckt das qualitativ hochwertige Kreditsegment ab.
  why: |
    Weil IG-Anleihen von vielen institutionellen Investoren gehalten werden, signalisiert
    eine Ausweitung hier eine breitere Risikoaversion als der HY-Markt. Steigende
    IG-Spreads verteuern die Unternehmensfinanzierung quer durch die Realwirtschaft.
  example: |
    Auch hier gilt: je hoeher der Aufschlag, desto mehr Sorge um Ausfaelle - allerdings
    geht es um solide Firmen mit gutem Rating, nicht um Wackelkandidaten.

    **So liest du die Hoehe:** 100-130 bp sind normal und ruhig. Ueber 150 bp wird es
    angespannt. Ueber 250 bp ist es ernst - dann zweifelt der Markt selbst an soliden
    Schuldnern.

    **Beispiele:** Im Corona-Crash (Maerz 2020) sprang der Aufschlag auf rund 370 bp, auf
    dem Hoehepunkt der Finanzkrise 2008 sogar ueber 600 bp. Weil viele grosse Investoren
    gerade diese Anleihen halten, trifft Stress hier die Finanzmaerkte besonders breit.

- id: eu_hy_spread
  name: "Euro High Yield Spread (OAS)"
  category: credit
  source: fred
  series_id: BAMLHE00EHYIOAS
  unit: bp
  display_multiplier: 100
  decimals: 0
  direction: higher_is_stress
  thresholds:
    elevated: 500
    stress: 800
  what: |
    Pendant zum US-HY-Spread fuer auf Euro lautende Hochzinsanleihen. Misst die
    Kreditrisikopraemie im europaeischen Speculative-Grade-Segment.
  why: |
    Reagiert zusaetzlich zu globalem Risk-Off auf europaspezifische Faktoren
    (EZB-Politik, Peripherie-/Bankenrisiken, Energiekrise). Divergenzen zum
    US-HY-Spread zeigen regionale Stressherde an.
  example: |
    Dasselbe Prinzip wie beim US-Pendant, nur fuer Hochzins-Firmen aus dem Euroraum: ein
    hoher Aufschlag bedeutet Stress, ein niedriger Sorglosigkeit.

    **So liest du die Hoehe:** 350-450 bp sind ruhig, ueber 500 bp wird es angespannt, ueber
    800 bp herrscht echter Stress.

    **Beispiele:** In der Euro-Schuldenkrise 2011/12 und im Corona-Crash 2020 schoss der
    Aufschlag jeweils ueber 800 bp. Liegt er deutlich hoeher als der US-Wert, steckt das
    Problem eher in Europa (z. B. Banken oder Energiekrise) als in der Weltwirtschaft.

# ----------------------------------------------------------------------------
# 2) YIELD CURVE & RATES
# ----------------------------------------------------------------------------
- id: us_10y
  name: "US 10Y Treasury Yield"
  priority: 2
  category: rates
  source: fred
  series_id: DGS10
  unit: "%"
  decimals: 2
  direction: neutral
  what: |
    Rendite 10-jaehriger US-Staatsanleihen - der globale Referenzzins fuer
    langfristige risikofreie Verzinsung.
  why: |
    Diskontierungssatz fuer praktisch alle Risiko-Assets. Steigt die 10Y-Rendite,
    sinkt der Barwert kuenftiger Cashflows (Belastung v.a. fuer Wachstums-/Tech-Aktien)
    und Refinanzierung wird teurer. Spiegelt Wachstums-, Inflations- und Fed-Erwartungen.
  example: |
    Diese Rendite ist der wichtigste Zins der Welt - an ihm haengen Kredite, Hypotheken und
    die Bewertung fast aller Anlagen.

    **So liest du die Werte:** In der Niedrigzinsphase 2020 lag sie bei nur ~0,5 %. Mit dem
    Inflationsschock stieg sie bis 2023 auf rund 5 %.

    **Worauf es ankommt:** Nicht nur die Hoehe zaehlt, sondern das Tempo. Steigt die Rendite
    schnell (wie 2022), verlieren Anleihen UND Aktien gleichzeitig an Wert, weil kuenftige
    Gewinne staerker abgezinst werden. Besonders Tech- und Wachstumsaktien leiden darunter.

- id: us_10y_2y
  name: "US 10Y-2Y Anleihen Spread (inverse Zinskurve)"
  priority: 3
  category: rates
  source: fred
  series_id: T10Y2Y
  unit: bp
  display_multiplier: 100
  decimals: 0
  direction: lower_is_stress
  thresholds:
    elevated: 25
    stress: 0
  what: |
    Differenz zwischen 10- und 2-jaehriger US-Rendite. Der bekannteste Indikator
    fuer die Steilheit der Zinskurve.
  why: |
    **Warum kann die 2-jaehrige ueberhaupt mehr Rendite bringen als die 10-jaehrige?**
    Fuer 2 Jahre verlangen Anleger etwa den Zins, den die Notenbank gerade festgelegt
    hat (z.B. 5%, weil sie Inflation bekaempft). Fuer 10 Jahre verlangen sie dagegen
    ungefaehr den DURCHSCHNITTLICHEN Zins, den sie ueber die ganze Laufzeit erwarten.
    Glauben sie, dass die Notenbank die 5% nicht durchhalten kann, sondern z.B. in
    1-2 Jahren wegen einer Rezession auf 2% senken und dort einige Jahre bleiben muss,
    ergibt das einen 10-Jahres-Durchschnitt von vielleicht 3% - also WENIGER als die
    heutigen 5% fuer 2 Jahre. Weil viele Anleger das so sehen, kaufen sie jetzt
    massiv 10-jaehrige Anleihen, um sich die 3% noch zu sichern, bevor die Zinsen
    weiter fallen - diese hohe Nachfrage treibt den Kurs der Anleihe nach oben und
    damit ihre Rendite zusaetzlich nach unten. Die Kurve "invertiert". Drei
    Blickwinkel, warum das eine Krise ankuendigt:

    **1. Das Banken-Problem (der Geldfluss stoppt).** Stell dir vor, du bist eine
    Bank. Dein Geschaeft ist simpel: Du leihst dir Geld von Sparern (kurzfristig) und
    zahlst ihnen wenig Zinsen. Du verleihst dieses Geld als Kredit an Haeuslebauer
    und Firmen (langfristig) und verlangst mehr Zinsen. Die Differenz ist dein
    Gewinn. In der Inversion sind die kurzfristigen Zinsen ploetzlich hoeher als die
    langfristigen - die Bank muesste also mehr an Sparer zahlen, als sie mit neuen
    Krediten verdient. Folge: Die Bank vergibt deutlich weniger Kredite. Wenn kein
    Geld mehr fliesst, koennen Firmen keine Maschinen kaufen und Menschen keine
    Haeuser bauen - die Wirtschaft bremst ab.

    **2. Die "Angst-Wette" der Profis.** Wenn grosse institutionelle Anleger
    (Versicherungen, Pensionsfonds) sehen, dass sie fuer 2 Jahre 5% bekommen, ihr
    Geld aber trotzdem lieber fuer 10 Jahre zu nur 3% weggeben, hat das einen Grund:
    Sie rechnen damit, dass es in 1-2 Jahren kaum noch Zinsen geben wird, weil die
    Wirtschaft dann am Boden liegt. Lieber jetzt 3% fuer 10 Jahre sichern, bevor man
    spaeter noch weniger bekommt.

    **3. Der "Bremsklotz"-Effekt.** Die hohen kurzfristigen Zinsen sind wie eine
    Vollbremsung: Die Notenbank tritt sie, um die Inflation zu stoppen. Eine
    Inversion zeigt, dass diese Bremse so fest getreten wurde, dass der Motor der
    Wirtschaft wahrscheinlich abzusaufen droht.

    **Zusammengefasst:** Eine inverse Kurve bedeutet, dass Geldleihen unlogisch und
    teuer wird. Und wenn Geldleihen nicht mehr funktioniert, bricht moderner
    Wohlstand meistens kurz darauf ein. Seit den 1950ern ging praktisch jeder
    US-Rezession eine Inversion voraus - allerdings mit 6-24 Monaten Vorlauf, also
    kein Timing-Tool fuer den exakten Zeitpunkt.
  example: |
    Diese Kennzahl vergleicht den langen mit dem kurzen Zins. Normalerweise ist der lange
    hoeher (positiver Wert) - Anleger wollen fuer laengere Bindung mehr Zins. Wird der Wert
    negativ ("inverse Kurve"), erwartet der Markt bald sinkende Zinsen - meist wegen einer
    drohenden Rezession.

    **So liest du die Werte:**
    - **Positiv (> 25 bp):** Normalzustand, keine Warnung.
    - **Um 0 bp:** Warnstufe - die Kurve flacht ab, Vorsicht ist angebracht.
    - **Negativ:** Inversion - klassisches Rezessionssignal, aber kein Timing-Tool
      (die Rezession folgt meist erst 6-24 Monate spaeter).

    **Historische Beispiele:**

    - **1989, 2000, 2006/07:** Vor allen drei grossen US-Rezessionen (1990/91,
      2001, 2007-09) war die Kurve Monate vorher invertiert. 2006 lag der Spread
      ueber ein Jahr leicht im Minus, bevor 2008 die Finanzkrise eskalierte.

    - **2019:** Die Kurve invertierte kurz (Maerz und August 2019) - kurz darauf
      kam tatsaechlich eine Rezession, allerdings ausgeloest durch Corona (2020).
      Ob die Inversion diese "vorhergesehen" hat oder Zufall war, ist umstritten -
      zeigt aber, dass das Signal nicht immer eindeutig interpretierbar ist.

    - **Juli 2022 - Sommer 2024:** Laengste und tiefste Inversion seit den 1980ern
      (bis ca. -100 bis -180 bp), weil die US-Notenbank die Zinsen rasant gegen die
      hohe Inflation anhob. Viele erwarteten deshalb eine Rezession fuer 2023 -
      die aber (zumindest bis Redaktionsschluss) ausblieb ("Soft Landing"). Die
      Kurve normalisierte sich erst, als die Fed ab Mitte 2024 wieder begann, die
      Zinsen zu senken.

    **Lehre daraus:** Eine Inversion ist ein ernstzunehmendes Warnsignal mit guter
    Trefferquote ueber Jahrzehnte - aber kein Garant. Sie sagt "die Bedingungen fuer
    eine Krise sind da", nicht "die Krise kommt naechsten Monat".

- id: us_10y_3m
  name: "US 10Y-3M Spread"
  category: rates
  source: fred
  series_id: T10Y3M
  unit: bp
  display_multiplier: 100
  decimals: 0
  direction: lower_is_stress
  thresholds:
    elevated: 25
    stress: 0
  what: |
    Differenz zwischen 10-jaehriger Rendite und 3-Monats-T-Bill. Die von der Fed
    bevorzugte Kurvenkennzahl (NY-Fed-Rezessionsmodell).
  why: |
    Das kurze Ende spiegelt direkt den aktuellen Leitzins. Diese Kurve invertiert,
    wenn die Fed restriktiv ist, der Markt aber sinkendes Wachstum einpreist - laut
    Fed-Forschung der praeziseste Vorlauf-Indikator fuer Rezessionen.
  example: |
    Eng verwandt mit der 10Y-2Y-Kurve, aber mit dem ganz kurzen Zins (3 Monate) verglichen.
    Die US-Notenbank haelt diese Variante fuer das praeziseste Rezessionssignal.

    **So liest du die Werte:** Positiv = normal. Negativ = der Markt rechnet damit, dass die
    Fed die Zinsen bald senken muss, weil die Wirtschaft schwaechelt.

    **Beispiel:** 2023 war diese Kurve tief invers (~-150 bp). Die New Yorker Fed rechnet
    daraus eine monatliche Rezessionswahrscheinlichkeit aus.

- id: de_10y_bund
  name: "German 10Y Bund Yield"
  category: rates
  source: fred
  series_id: IRLTLT01DEM156N
  unit: "%"
  decimals: 2
  direction: neutral
  cache_ttl_minutes: 1440
  what: |
    Rendite 10-jaehriger deutscher Bundesanleihen - der risikofreie Referenzzins
    der Eurozone (monatliche Serie).
  why: |
    Bunds sind der Safe-Haven-Anker Europas; ihre Rendite bestimmt die
    Finanzierungskosten in der gesamten Eurozone. Der Spread anderer Laender zum
    Bund misst deren laenderspezifisches Risiko (z.B. Italien-Spread).
  example: |
    Die deutsche Bundesanleihe ist der sichere Hafen und Zins-Anker der Eurozone - das
    Gegenstueck zur US-Staatsanleihe.

    **So liest du die Werte:** 2019-2021 war die Rendite sogar negativ (bis ~-0,7 %) -
    Anleger zahlten also fuer die Sicherheit. Mit der Zinswende 2022/23 stieg sie auf ueber
    2,5 %.

    **Wozu sie dient:** Der Abstand anderer Laender zu dieser Rendite (z. B. Italien) zeigt,
    wie riskant der Markt diese Laender einschaetzt - ein Stressmass fuer die Eurozone.

- id: fed_funds
  name: "Effective Fed Funds Rate"
  category: rates
  source: fred
  series_id: DFF
  unit: "%"
  decimals: 2
  direction: neutral
  what: |
    Effektiver Tagesgeldsatz, zu dem sich US-Banken ueber Nacht Zentralbankreserven
    leihen - die operative Steuerungsgroesse der Fed.
  why: |
    Der Leitzins ist der Ausgangspunkt der gesamten Zinsstruktur. Sein Niveau und
    seine Aenderungsgeschwindigkeit bestimmen die Liquiditaetsbedingungen fuer alle
    Maerkte; Straffungszyklen sind historisch oft Ausloeser von Marktverwerfungen.
  example: |
    Das ist der Leitzins der US-Notenbank - der Startpunkt fuer praktisch alle anderen
    Zinsen.

    **So liest du die Werte:** 2020-2022 lag er nahe 0 %. Dann folgte der schnellste
    Zinsanstieg seit den 1980ern auf 5,25-5,50 % bis 2023.

    **Worauf es ankommt:** Wie schnell die Fed anhebt, ist oft wichtiger als das Niveau.
    Scharfe Zinserhoehungen haben in der Vergangenheit immer wieder Marktturbulenzen
    ausgeloest, weil sie Kredit und Liquiditaet verteuern.

# ----------------------------------------------------------------------------
# 3) INFLATION EXPECTATIONS
# ----------------------------------------------------------------------------
- id: us_5y_breakeven
  name: "US 5Y Breakeven Inflation"
  category: inflation
  source: fred
  series_id: T5YIE
  unit: "%"
  decimals: 2
  direction: neutral
  what: |
    Vom Markt eingepreiste durchschnittliche Inflation der naechsten 5 Jahre,
    abgeleitet aus der Renditedifferenz nominaler Anleihen zu inflationsindexierten
    (TIPS).
  why: |
    Zeigt, ob der Markt der Notenbank Glaubwuerdigkeit zuschreibt. Ein Anstieg deutet
    auf nachlassende Inflationsverankerung; weil die Fed darauf reagiert, treibt das
    Zins- und Aktienmarkterwartungen unmittelbar.
  example: |
    Diese Zahl zeigt, wie viel Inflation der Markt fuer die naechsten 5 Jahre erwartet -
    abgeleitet aus dem Preis von Anleihen.

    **So liest du die Werte:** Rund 2,0-2,3 % passt zum Ziel der Notenbank. Deutlich
    darunter heisst Deflationsangst, deutlich darueber heisst Inflationssorge.

    **Beispiele:** Im Corona-Tief (Maerz 2020) fiel der Wert auf ~0,1 % (Angst vor fallenden
    Preisen). Im Inflationsschub 2022 stieg er auf ueber 3,5 %. Weil die Fed darauf
    reagiert, bewegt diese Zahl direkt Zinsen und Aktien.

- id: us_5y5y_forward
  name: "US 5Y5Y Forward Inflation"
  category: inflation
  source: fred
  series_id: T5YIFR
  unit: "%"
  decimals: 2
  direction: neutral
  what: |
    Erwartete durchschnittliche Inflation fuer den 5-Jahres-Zeitraum, der in 5 Jahren
    beginnt. Klammert kurzfristige Schocks aus und misst die "langfristige Verankerung".
  why: |
    Die von Notenbanken meistbeachtete marktbasierte Inflationskennzahl. Bleibt sie
    nahe 2%, gilt die Inflation als verankert; ein Ausbruch signalisiert strukturellen
    Glaubwuerdigkeitsverlust und erzwingt eine restriktivere Geldpolitik.
  example: |
    Aehnlich wie die Breakeven-Inflation, blendet aber die naechsten 5 Jahre aus und schaut
    nur auf die 5 Jahre danach. So sieht man die langfristige Inflationserwartung, ohne
    aktuelle Schocks.

    **So liest du die Werte:** Bleibt der Wert nahe 2 %, gilt die Inflation als "verankert"
    - der Markt vertraut der Notenbank. Bricht er deutlich aus, ist dieses Vertrauen in
    Gefahr.

    **Beispiel:** Als der Wert 2014-2016 unter 1,5 % fiel, war das ein wichtiger Grund fuer
    das grosse Anleihekaufprogramm der EZB. Der US-Wert liegt meist zwischen 2,0 und 2,5 %.

# ----------------------------------------------------------------------------
# 4) VOLATILITY
# ----------------------------------------------------------------------------
- id: vix
  name: "CBOE VIX (Equity Volatility)"
  priority: 3
  category: volatility
  source: fred
  series_id: VIXCLS
  unit: Index
  decimals: 1
  direction: higher_is_stress
  thresholds:
    elevated: 20
    stress: 30
  what: |
    Aus S&P-500-Optionen abgeleitete erwartete 30-Tage-Volatilitaet ("Angstbarometer").
    Misst, wie stark der Markt kuenftige Schwankungen einpreist.
  why: |
    Steigt mechanisch, wenn Investoren Absicherung (Puts) nachfragen - typisch in
    Stressphasen. Hohe VIX-Werte zwingen volatilitaetsgesteuerte Strategien zum
    Verkauf, was Abwaertsbewegungen verstaerkt (reflexive Dynamik).
  example: |
    Der VIX ist das "Angstbarometer" der Boerse: Er misst, wie starke Schwankungen der Markt
    fuer die naechsten 30 Tage erwartet. Hohe Werte = Nervositaet.

    **So liest du die Werte:** 12-16 ist ruhig. Ueber 20 wird der Markt unruhig. Ueber 30
    herrscht Panik.

    **Beispiele:** Im Corona-Crash (Maerz 2020) schoss der VIX auf ~82, in der Finanzkrise
    2008 auf ~80. Umgekehrt ist auch ein dauerhaft sehr niedriger VIX (unter 13) ein
    Warnsignal - dann ist der Markt vielleicht zu sorglos.

# ----------------------------------------------------------------------------
# 5) FX
# ----------------------------------------------------------------------------
- id: dxy
  name: "US Dollar Index"
  priority: 2
  category: fx
  source: stooq
  symbol: "^dxy"
  unit: Index
  decimals: 2
  direction: neutral
  what: |
    Wert des US-Dollar gegen einen Korb von 6 Hauptwaehrungen (v.a. EUR, JPY, GBP).
    Der wichtigste Gradmesser fuer die globale Dollar-Staerke.
  why: |
    Der Dollar ist die globale Funding- und Reservewaehrung. Ein starker Dollar strafft
    weltweit die Finanzbedingungen, belastet Rohstoffe (in USD notiert) und
    Schwellenlaender mit Dollar-Schulden - oft ein Risk-Off-Signal.
  example: |
    Der Dollar-Index zeigt, wie stark der US-Dollar gegenueber anderen wichtigen Waehrungen
    (v.a. Euro, Yen, Pfund) ist.

    **Warum das wichtig ist:** Ein starker Dollar macht weltweit Geld teurer - er belastet
    Rohstoffe (in Dollar gehandelt) und Schwellenlaender mit Dollar-Schulden. Steigt der
    Index stark, ist das oft ein Risk-Off-Signal (Anleger werden vorsichtig).

    **Beispiele:** In Krisen fluechten viele in den Dollar (Corona 2020, Zinswende 2022 mit
    Werten ueber 114). Ein schwacher Dollar (unter 95) geht dagegen meist mit guter
    Risikostimmung einher.

- id: eur_usd
  name: "EUR/USD"
  category: fx
  source: stooq
  symbol: eurusd
  unit: Rate
  decimals: 4
  direction: neutral
  what: |
    Wechselkurs Euro zu US-Dollar - das meistgehandelte Waehrungspaar der Welt.
  why: |
    Spiegelt die relative Geldpolitik und Konjunktur von EZB und Fed sowie globale
    Risikostimmung. Faellt in europaeischen Stressphasen, steigt bei Dollar-Schwaeche.
  example: |
    Das meistgehandelte Waehrungspaar der Welt - es zeigt, wie viele Dollar ein Euro kostet.

    **Was es bewegt:** Vor allem der Zinsunterschied und die Konjunktur zwischen Europa und
    den USA sowie die allgemeine Risikostimmung. In europaeischen Krisen faellt der Euro, bei
    Dollar-Schwaeche steigt er.

    **Beispiel:** Im Energiekrisen-Herbst 2022 fiel EUR/USD erstmals seit 20 Jahren unter die
    Paritaet (1,00) - ein Euro war also kurzzeitig weniger als ein Dollar wert.

- id: eur_chf
  name: "EUR/CHF"
  category: fx
  source: stooq
  symbol: eurchf
  unit: Rate
  decimals: 4
  direction: neutral
  what: |
    Wechselkurs Euro zu Schweizer Franken. Der Franken ist die klassische
    europaeische Safe-Haven-Waehrung.
  why: |
    Faellt (CHF-Staerke), wenn Investoren in Krisenphasen Sicherheit suchen - ein
    sensibler Stimmungsindikator fuer europaeisches Risiko. Lange von der SNB verteidigt.
  example: |
    Der Schweizer Franken ist Europas klassische "sichere Hafen"-Waehrung. Dieser Kurs
    zeigt, wie viele Franken ein Euro kostet.

    **Wie man ihn liest:** Faellt der Kurs (Franken wird staerker), suchen Anleger Sicherheit
    - ein Warnsignal fuer europaeisches Risiko. Ein stabiler oder steigender Kurs deutet auf
    Entspannung.

    **Beispiel:** Als die Schweizer Notenbank im Januar 2015 ueberraschend ihren Mindestkurs
    aufgab, stuerzte EUR/CHF binnen Minuten von 1,20 auf unter Paritaet - eine der
    heftigsten Waehrungsbewegungen ueberhaupt.

# ----------------------------------------------------------------------------
# 6) COMMODITIES
# ----------------------------------------------------------------------------
- id: gold
  name: "Gold (USD/oz)"
  category: commodities
  source: stooq
  symbol: xauusd
  unit: USD
  decimals: 0
  direction: neutral
  what: |
    Goldpreis je Feinunze in USD (Spot; via stooq mit Yahoo-Fallback, da FRED die
    London-Fixings eingestellt hat). Wertaufbewahrungsmittel ohne Gegenparteirisiko.
  why: |
    Profitiert von Realzins-Rueckgang (geringere Opportunitaetskosten), Dollar-Schwaeche,
    geopolitischem Stress und Notenbankkaeufen. Dient als Inflations- und Krisenhedge.
  example: |
    Gold gilt seit jeher als Wertspeicher und Krisenschutz - ein "Versicherungs-Asset" ohne
    Gegenpartei.

    **Was Gold treibt:** Es profitiert, wenn die real (nach Inflation) erzielbaren Zinsen
    sinken, der Dollar schwaechelt, geopolitischer Stress steigt oder Notenbanken kraeftig
    zukaufen.

    **Beispiele:** Gold erreichte 2020 (ueber 2000 USD) und erneut 2024 Rekorde - getrieben
    von niedrigen Realzinsen, kaufenden Notenbanken und politischen Krisen.

