    risiko). Sehr hohe Short-Wetten koennen umgekehrt zu einer schnellen Gegenbewegung
    fuehren.

    **Beispiel:** Rekord-Short-Positionen gingen mehrfach kraeftigen Erholungen voraus (weil
    die Wetten zurueckgekauft werden mussten). Extreme Long-Positionen markierten dagegen
    anfaellige Marktphasen.

# ----------------------------------------------------------------------------
# 10) VALUATION  (Spezialquellen: Shiller CAPE + abgeleitetes ERP)
# ----------------------------------------------------------------------------
- id: shiller_cape
  name: "Shiller CAPE Ratio (S&P 500)"
  priority: 2
  category: valuation
  source: shiller
  symbol: cape
  unit: Ratio
  decimals: 1
  direction: higher_is_stress
  cache_ttl_minutes: 1440
  thresholds:
    elevated: 30
    stress: 38
  what: |
    Zyklisch bereinigtes Kurs-Gewinn-Verhaeltnis des S&P 500: Preis geteilt durch die
    inflationsbereinigten Durchschnittsgewinne der letzten 10 Jahre (Robert Shiller).
  why: |
    Glaettet Konjunkturzyklen und ist daher ein robusteres Bewertungsmass als das
    einfache KGV. Hohe CAPE-Werte korrelieren historisch mit niedrigeren realen
    10-Jahres-Renditen - ein Mass fuer langfristiges Rueckschlagrisiko, kein Timing-Tool.
  example: |
    Das CAPE ist ein Kurs-Gewinn-Verhaeltnis fuer den S&P 500, das die Gewinne ueber 10 Jahre
    glaettet und um Inflation bereinigt. So verzerren einzelne gute oder schlechte Jahre die
    Bewertung nicht.

    **Wie man es liest:** Hohe Werte bedeuten teure Aktien - historisch folgten darauf magere
    langfristige Renditen. Es ist ein Risikomass fuer Jahre, kein Timing-Signal.

    **Beispiele:** Der langfristige Schnitt liegt bei rund 17. Auf dem Dotcom-Hoch 2000 stand
    das CAPE bei ~44 (Rekord), 2021 bei ueber 38. Im Tief der Finanzkrise 2009 fiel es auf
    ~13.

- id: equity_risk_premium
  name: "US Equity Risk Premium"
  category: valuation
  source: computed
  # Earnings Yield (1/CAPE) minus risikofreier 10Y-Zins (vereinfachtes ERP).
  formula: "invert(shiller:cape) * 100 - fred:DGS10"
  unit: "%"
  decimals: 2
  direction: higher_is_supportive
  cache_ttl_minutes: 1440
  what: |
    Vereinfachte Aktienrisikopraemie: zyklisch bereinigte Gewinnrendite des S&P 500
    (1 / CAPE) abzueglich der 10-jaehrigen US-Staatsanleiherendite.
  why: |
    Misst die Mehrrendite, die Aktien gegenueber sicheren Anleihen bieten. Eine niedrige
    oder negative Praemie bedeutet, dass Anleger fuer Aktienrisiko kaum kompensiert
    werden (Aktien teuer relativ zu Anleihen) - relevant in Hochzinsphasen.
  example: |
    Diese Kennzahl vergleicht, was Aktien einbringen, mit dem sicheren Zins von
    Staatsanleihen. Vereinfacht: Gewinnrendite des S&P 500 (aus dem CAPE) minus die
    10-jaehrige US-Anleiherendite.

    **Wie man sie liest:** Eine hohe Praemie heisst, Aktien werden fuer ihr Risiko gut bezahlt
    (attraktiv gegenueber Anleihen). Eine niedrige oder negative Praemie heisst, man bekommt
    fuer das Aktienrisiko kaum Mehrertrag - Aktien sind dann teuer im Vergleich zu Anleihen.

    **Beispiel:** 2022/23 fiel die Praemie stark, weil steigende Anleihezinsen Aktien relativ
    unattraktiver machten. In der Niedrigzins-Zeit davor war sie hoch und stuetzte die
    Aktienkurse.
